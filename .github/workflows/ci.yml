name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        # Headless test deps only — the pure logic + storage tests don't need
        # PyQt5, torch or a display. opencv-python-headless keeps CI fast.
        run: |
          python -m pip install --upgrade pip
          pip install numpy opencv-python-headless openpyxl pytest ruff

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest -q
